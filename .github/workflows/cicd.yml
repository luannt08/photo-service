name: Deploy uploader app to ec2

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create .env file
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest
      # - name: Deploy to EC2
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.EC2_HOST }}
      #     username: ${{ secrets.EC2_USER }}
      #     key: ${{ secrets.EC2_SSH_KEY }}
      #     script: |
      #       docker pull ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest
      #       docker stop ec2-uploader || true
      #       docker rm ec2-uploader || true
      #       docker run -d --name ec2-uploader -p 80:80 ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest
      - name: Stop and remove existing container
        run: docker rm -f ec2-uploader-container
      - name: Run new container
        run: docker run -d --name ec2-uploader-container -p 4040:80 ${{ secrets.DOCKER_USERNAME }}/ec2-uploader:latest
